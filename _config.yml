# ── Site ────────────────────────────────────────────────────────────────
title            : "Sanzid"
tagline          : "AI researcher & engineer"
description       : >-
  Dr. Md. Sanzidul Islam — AI researcher and engineer working on machine
  learning, NLP and applied AI for healthcare and low-resource languages.
url              : "https://sanzid.dev"
baseurl          : ""
repository       : "sanzidikawsar/sanzidkawsar"
locale           : "en-US"
lang             : "en"
timezone         : Asia/Riyadh

# ── Author / identity ───────────────────────────────────────────────────
author:
  name           : "Md. Sanzidul Islam"
  short_name     : "Sanzid"
  title          : "PhD in Data Science, King Abdulaziz University"
  avatar         : "/images/profile.png"
  email          : "sanzid.me@gmail.com"
  location       : "Jeddah, Saudi Arabia · Dhaka, Bangladesh"
  bio            : >-
    AI researcher and engineer. I build machine-learning and NLP systems —
    from Bangla language & vision datasets to LLM-driven clinical decision
    support — and lead applied AI engineering work.

# Links render as icons in the footer / hero. Leave blank to hide.
links:
  - { label: "Email",          icon: "mail",     url: "mailto:sanzid.me@gmail.com" }
  - { label: "GitHub",         icon: "github",   url: "https://github.com/sanzidikawsar" }
  - { label: "Google Scholar", icon: "scholar",  url: "https://scholar.google.com/citations?user=m0eRuEoAAAAJ&hl=en" }
  - { label: "ORCID",          icon: "orcid",    url: "https://orcid.org/0000-0002-9563-2419" }
  - { label: "Scopus",         icon: "scopus",   url: "https://www.scopus.com/authid/detail.uri?authorId=57205019523" }
  - { label: "LinkedIn",       icon: "linkedin", url: "https://www.linkedin.com/in/sanzidikawsar" }
  - { label: "Bluesky",        icon: "bluesky",  url: "https://bsky.app/profile/sanzidikawsar.bsky.social" }
  - { label: "Mastodon",       icon: "mastodon", url: "https://mastodon.social/@sanzidikawsar" }

# Scholar metrics (shown on Publications page; update as they change)
scholar:
  citations : 840
  h_index   : 14
  i10_index : 16
  profile   : "https://scholar.google.com/citations?user=m0eRuEoAAAAJ&hl=en"

# ── Build ───────────────────────────────────────────────────────────────
collections:
  works:
    output   : true
    permalink : /works/:name/

defaults:
  - scope: { path: "", type: "posts" }
    values: { layout: "post" }
  - scope: { path: "", type: "works" }
    values: { layout: "page" }
  - scope: { path: "" }
    values: { layout: "page" }

markdown        : kramdown
highlighter     : rouge
kramdown:
  input         : GFM
  syntax_highlighter: rouge

sass:
  style         : compressed

permalink       : /blog/:year/:month/:title/
words_per_minute: 180

include:
  - "_pages"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - Dockerfile
  - docker-compose.yaml
  - package.json
  - node_modules
  - vendor
  - .devcontainer
  - scripts
