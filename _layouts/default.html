<!doctype html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0c0e" media="(prefers-color-scheme: dark)">

  {% seo %}
  {% feed_meta %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/images/apple-touch-icon-180x180.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/images/favicon.svg' | relative_url }}">

  <!-- Set theme before paint to avoid a flash of the wrong color scheme -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <nav class="nav container" aria-label="Primary">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.author.short_name | default: 'Sanzid' }}</a>
      <div class="nav-links">
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/works/' | relative_url }}">Works</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle theme">
          {% include icon.html name="sun" %}{% include icon.html name="moon" %}
        </button>
      </div>
    </nav>
  </header>

  <main id="main" class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-links">
        {% for link in site.links %}
          <a href="{{ link.url }}" aria-label="{{ link.label }}" title="{{ link.label }}"{% unless link.url contains 'mailto' %} rel="me noopener" target="_blank"{% endunless %}>
            {% include icon.html name=link.icon %}
          </a>
        {% endfor %}
      </div>
      <p class="footer-copy">© {{ 'now' | date: "%Y" }} {{ site.author.name }} · Built with Jekyll</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
</body>
</html>
